<!--
================================================================================
  このアプリについて
  山あるき — 設計思想と共同編集の進め方
================================================================================

【アプリの目的】
  囲碁・麻雀のリーグ戦管理アプリ群のポータルページ。
  山あるきメンバーが各アプリにアクセスするための入口として機能する。

【利用環境】
  - スマホ利用を最優先とする（モバイルファースト）
  - GitHub Pages でホスティング（単一 index.html で完結）
  - 各アプリへのリンクを管理する

【技術構成】
  - 純粋なHTML/CSS（JavaScriptなし）
  - 外部ライブラリなし・ビルド不要・1ファイル完結
  - シンプルさを最優先とする

【共同編集の進め方】
  このアプリは、ユーザーと生成AIが対話しながら少しずつ育てていくものです。
  以下は、その共同作業をうまく続けるための共通認識です。

  ・このアプリの文脈と歴史を理解した上で提案する
  ・変更の意図と影響範囲を共有しながら進める
  ・小さな積み重ねを大切にし、一度に大きく変えない
  ・既存の操作感や雰囲気はできるだけ引き継ぐ
  ・読みやすく・触りやすく・壊れにくい構成を選ぶ
  ・新しい技術より、長く使い続けられることを優先する
  ・アプリを追加・変更したら「収録アプリ」を合わせて更新する

【収録アプリ（現時点）】
  - 囲碁リーグ戦「星取」（igo.html）：星取表・履歴・手合い管理
  - 麻雀リーグ戦「点棒」（mahjong.html）：成績・順位・履歴の共有
  - 囲碁 一局一得（goroku.html）：対局前に考え、対局後に学ぶアプリ。しおり機能付き
  - 足あと（ashiato.html）：仲間との活動記録・希望地の共有
================================================================================
-->
