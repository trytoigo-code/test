<!--
================================================================================
  このアプリについて
  足あと — 設計思想と共同編集の進め方
================================================================================

【アプリの目的】
  仲間との活動記録を共有するアプリ。
  どこに行ったか、誰が参加したか、次はどこに行きたいかをグループで共有する。
  複数のグループ（山あるき・遠足クラブ・ぶんかのかい等）で共用し、
  URLの ?group= パラメータでデータを切り替える。

【利用環境】
  - スマホ利用を最優先とする（モバイルファースト）
  - GitHub Pages でホスティング（単一 ashiato.html で完結）
  - Firebase Realtime Database によるリアルタイム同期
  - 各グループの index.html から ?title=〇〇&group=〇〇 付きでリンク
  - 単独起動時は ?group= なしで起動（testデータを参照）

【技術構成】
  - バニラJS（React・Babel 不使用）
  - Firebase Realtime Database（CDN読み込み）
  - Google Fonts（Noto Sans JP）
  - 外部ライブラリなし・ビルド不要・1ファイル完結
  - 新技術の導入より、継続して利用しやすい構成を優先する

【共同編集の進め方】
  このアプリは、ユーザーと生成AIが対話しながら少しずつ育てていくものです。
  以下は、その共同作業をうまく続けるための共通認識です。

  ・このアプリの文脈と歴史を理解した上で提案する
  ・変更の意図と影響範囲を共有しながら進める
  ・小さな積み重ねを大切にし、一度に大きく変えない
  ・既存の操作感や雰囲気はできるだけ引き継ぐ
  ・読みやすく・触りやすく・壊れにくい構成を選ぶ
  ・新しい技術より、長く使い続けられることを優先する
  ・機能を追加・変更したら「主な機能」と「今後の改良候補」を合わせて更新する

【主な機能（現時点）】
  - 📋記録タブ：活動記録の一覧・追加・編集・削除（活動種別：囲碁／麻雀 複数選択可、予定フラグ付き）
  - 🌟希望タブ：行き先希望の一覧・追加（メモ任意）・編集・投票（名前選択式トグル）・削除
  - ⚙️設定タブ：管理者の仕事（メンバー管理）
  - データエクスポート（設定タブからJSONファイルとしてダウンロード。日付入りファイル名で保存）

【セキュリティ】
  - 合言葉認証あり（初回のみ入力）
  - 認証情報はブラウザのlocalStorageに保存される
  - 別端末・別ブラウザ・キャッシュ削除後は再入力が必要

【今後の改良候補】
  - 活動の写真添付
  - 行き先マップ表示
  - 希望地の実現済みマーク
================================================================================
-->

        <div class="inline-edit-form" id="act-edit-${id}">
          <div class="fg"><label>活動日</label><input type="date" id="ae-date-${id}" value="${dateVal}"></div>
          <div class="fg"><label>種類</label><div class="member-checks"><button type="button" class="member-check-btn ${yoteiBtnSel}" id="ae-yotei-${id}" onclick="this.classList.toggle('selected')">📅 予定</button></div></div>
          <div class="fg"><label>活動名・場所</label><textarea id="ae-name-${id}" rows="2">${(act.name||"").replace(/</g,'&lt;')}</textarea></div>
          <div class="fg"><label>活動種別</label><div class="member-checks" id="ae-kinds-${id}">${kindBtns}</div></div>
          <div class="fg"><label>参加メンバー</label><div class="member-checks" id="ae-members-${id}">${memberBtns}</div></div>
          <div class="fg"><label>メモ（任意）</label><textarea id="ae-note-${id}" rows="2">${act.note||""}</textarea></div>
          <button type="button" class="form-submit" onclick="submitActEdit('${id}')">更新する</button>
          <button type="button" class="form-cancel" onclick="toggleActEdit('${id}')">キャンセル</button>
        </div>
      </div>`;
  }).join("") || `<p style="color:#999;font-size:0.88rem">まだ活動記録がありません。</p>`;
}

function toggleActEdit(id) {
  const form = document.getElementById(`act-edit-${id}`);
  form.classList.toggle("open");
}

function submitActEdit(id) {
  const dateRaw = document.getElementById(`ae-date-${id}`).value;
  const name    = document.getElementById(`ae-name-${id}`).value.trim();
  const note    = document.getElementById(`ae-note-${id}`).value.trim();
  if (!dateRaw || !name) { alert("活動日と活動名を入力してください"); return; }
  const selMems  = document.querySelectorAll(`#ae-members-${id} .member-check-btn.selected`);
  const mems     = [...selMems].map(b => b.dataset.name);
  const selKinds = document.querySelectorAll(`#ae-kinds-${id} .member-check-btn.selected`);
  const kinds    = [...selKinds].map(b => b.dataset.kind);
  const yotei    = document.getElementById(`ae-yotei-${id}`).classList.contains("selected");
  if (activitiesRef) activitiesRef.child(id).update({
    date: dateRaw.replace(/-/g, "/"),
    name,
    members: mems,
    kinds: kinds.length ? kinds : null,
    yotei: yotei || null,
    note: note || null,
  });
  showToast("更新しました");
}

function deleteActivity(id) {
  if (!confirm("この活動記録を削除しますか？")) return;
  if (activitiesRef) activitiesRef.child(id).remove();
  showToast("削除しました");
}

// ---------- 希望タブ ----------
function renderKibou() {
  const list = Object.entries(wishes).sort((a,b) => {
    const va = Object.keys(b[1].votes||{}).length;
    const vb = Object.keys(a[1].votes||{}).length;
    return va - vb;
  });

  document.getElementById("kibou-list").innerHTML = list.length
    ? list.map(([id, w]) => {
        const votes = Object.keys(w.votes || {});
        const memberNames = members.map(m =>
          `<button class="vote-name-btn" data-id="${id}" data-name="${m}">${m}</button>`
        ).join("");
        const proposerOpts = members.map(m =>
          `<option value="${m}" ${w.proposer===m?"selected":""}>${m}</option>`
        ).join("");
        const noteDisp = w.note ? `<div style="font-size:0.78rem;color:#888;margin-top:4px">${w.note}</div>` : "";
        return `
          <div class="kibou-card" id="kibou-${id}">
            <div class="card-btn-row">
              <button class="edit-btn-sm" onclick="toggleKibouEdit('${id}')">修正</button>
              <button class="del-btn-sm" onclick="deleteWish('${id}')">削除</button>
            </div>
            <div class="kibou-title">${w.place || ""}</div>
            <div class="kibou-votes">
              🙋 ${votes.length}名${votes.length ? "：" + votes.join("・") : ""}
              ${w.proposer ? `<span style="color:#bbb;margin-left:8px">提案：${w.proposer}</span>` : ""}
            </div>
            ${noteDisp}
            <button class="vote-btn" data-id="${id}" style="margin-top:6px">行きたい！</button>
            <div class="vote-picker" id="picker-${id}">
              <div class="vote-picker-label">あなたの名前を選んでください</div>
              <div class="vote-name-btns">${memberNames}</div>
            </div>
            <div class="inline-edit-form" id="kib-edit-${id}">
              <div class="fg"><label>行き先・やりたいこと</label><textarea id="ke-place-${id}" rows="2">${(w.place||"").replace(/</g,'&lt;')}</textarea></div>
              <div class="fg"><label>提案者</label>
                <select id="ke-proposer-${id}">
                  <option value="">（選択してください）</option>
                  ${proposerOpts}
                </select>
              </div>
              <div class="fg"><label>メモ（任意）</label><textarea id="ke-note-${id}" rows="2">${w.note||""}</textarea></div>
              <button class="form-submit" onclick="submitKibouEdit('${id}')">更新する</button>
              <button class="form-cancel" onclick="toggleKibouEdit('${id}')">キャンセル</button>
            </div>
          </div>`;
      }).join("")
    : `<p style="color:#999;font-size:0.88rem">まだ希望地がありません。</p>`;

  const kibouList = document.getElementById("kibou-list");

  // 行きたいボタン
  kibouList.querySelectorAll(".vote-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.id;
      const picker = document.getElementById(`picker-${id}`);
      const isOpen = getComputedStyle(picker).display !== "none";
      kibouList.querySelectorAll(".vote-picker").forEach(p => p.style.display = "none");
      picker.style.display = isOpen ? "none" : "block";
    });
  });

  // 名前ボタン → 投票トグル
  kibouList.querySelectorAll(".vote-name-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const id   = btn.dataset.id;
      const name = btn.dataset.name;
      const current = (wishes[id]?.votes || {})[name];
      if (current) { if (wishesRef) wishesRef.child(id).child("votes").child(name).remove(); }
      else { if (wishesRef) wishesRef.child(id).child("votes").child(name).set(true); }
      document.getElementById(`picker-${id}`).style.display = "none";
    });
  });
}

function toggleKibouEdit(id) {
  const form = document.getElementById(`kib-edit-${id}`);
  form.classList.toggle("open");
}

function submitKibouEdit(id) {
  const place    = document.getElementById(`ke-place-${id}`).value.trim();
  const proposer = document.getElementById(`ke-proposer-${id}`).value;
  const note     = document.getElementById(`ke-note-${id}`).value.trim();
  if (!place) { alert("行き先を入力してください"); return; }
  if (!proposer) { alert("提案者を選択してください"); return; }
  if (wishesRef) wishesRef.child(id).update({ place, proposer, note: note || null });
  showToast("更新しました");
}

function deleteWish(id) {
  if (!confirm("この希望を削除しますか？")) return;
  if (wishesRef) wishesRef.child(id).remove();
  showToast("削除しました");
}

// ---------- フォーム（記録追加） ----------
document.getElementById("add-activity-btn").addEventListener("click", () => {
  actFormOpen = !actFormOpen;
  document.getElementById("activity-form").className = `form-box ${actFormOpen ? "open" : ""}`;
  if (actFormOpen) {
    const today = new Date();
    document.getElementById("act-date").value = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
    document.getElementById("act-name").value = "";
    document.getElementById("act-note").value = "";
    selectedActMembers.clear();
    selectedActKinds.clear();
    buildMemberChecks();
    buildKindChecks();
  }
});

document.getElementById("act-cancel").addEventListener("click", () => {
  actFormOpen = false;
  document.getElementById("activity-form").className = "form-box";
  const _yb = document.getElementById("act-yotei"); if (_yb) _yb.classList.remove("selected");
});

document.getElementById("act-submit").addEventListener("click", () => {
  const date = document.getElementById("act-date").value;
  const name = document.getElementById("act-name").value.trim();
  const note = document.getElementById("act-note").value.trim();
  if (!date || !name) { alert("活動日と活動名を入力してください"); return; }
  const yotei = document.getElementById("act-yotei").classList.contains("selected");
  if (activitiesRef) activitiesRef.push({
    date: date.replace(/-/g, "/"),
    name,
    members: [...selectedActMembers],
    kinds: selectedActKinds.size ? [...selectedActKinds] : null,
    yotei: yotei || null,
    note: note || null,
  });
  actFormOpen = false;
  document.getElementById("activity-form").className = "form-box";
  showToast("活動を登録しました");
});

function buildMemberChecks() {
  const wrap = document.getElementById("act-members");
  if (!wrap) return;
  wrap.innerHTML = members.map(m =>
    `<button class="member-check-btn ${selectedActMembers.has(m) ? "selected" : ""}" data-name="${m}">${m}</button>`
  ).join("");
  wrap.querySelectorAll(".member-check-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const name = btn.dataset.name;
      if (selectedActMembers.has(name)) selectedActMembers.delete(name);
      else selectedActMembers.add(name);
      btn.classList.toggle("selected");
    });
  });
}

function buildKindChecks() {
  const wrap = document.getElementById("act-kinds");
  if (!wrap) return;
  wrap.querySelectorAll(".member-check-btn").forEach(btn => {
    const kind = btn.dataset.kind;
    btn.className = `member-check-btn${selectedActKinds.has(kind) ? " selected" : ""}`;
    btn.onclick = () => {
      if (selectedActKinds.has(kind)) selectedActKinds.delete(kind);
      else selectedActKinds.add(kind);
      btn.classList.toggle("selected");
    };
  });
}

// ---------- フォーム（希望追加） ----------
document.getElementById("add-kibou-btn").addEventListener("click", () => {
  kibFormOpen = !kibFormOpen;
  document.getElementById("kibou-form").className = `form-box ${kibFormOpen ? "open" : ""}`;
  if (kibFormOpen) { document.getElementById("kib-place").value = ""; document.getElementById("kib-note").value = ""; }
});

document.getElementById("kib-cancel").addEventListener("click", () => {
  kibFormOpen = false;
  document.getElementById("kibou-form").className = "form-box";
});

document.getElementById("kib-submit").addEventListener("click", () => {
  const place    = document.getElementById("kib-place").value.trim();
  const proposer = document.getElementById("kib-proposer").value;
  const note     = document.getElementById("kib-note").value.trim();
  if (!place) { alert("行き先を入力してください"); return; }
  if (!proposer) { alert("提案者を選択してください"); return; }
  if (wishesRef) wishesRef.push({ place, proposer, note: note || null, votes: {} });
  kibFormOpen = false;
  document.getElementById("kibou-form").className = "form-box";
  showToast("希望を追加しました");
});

function buildProposerSelect() {
  const sel = document.getElementById("kib-proposer");
  sel.innerHTML = `<option value="">（選択してください）</option>`
    + members.map(m => `<option value="${m}">${m}</option>`).join("");
}

// ---------- データエクスポート ----------
document.getElementById("export-btn").addEventListener("click", () => {
  if (!isConfigured) { showToast("データベースに接続されていません"); return; }
  firebase.database().ref(`ashiato/${group}`).once("value", snap => {
    const data = snap.val();
    if (!data) { showToast("エクスポートするデータがありません"); return; }
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const date = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = `ashiato_${group}_backup_${date}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast("エクスポートしました");
  });
});

// ---------- 設定タブ（メンバー管理） ----------
document.getElementById("admin-toggle").addEventListener("click", () => {
  const body  = document.getElementById("admin-body");
  const arrow = document.getElementById("admin-arrow");
  const isOpen = body.style.display !== "none";
  body.style.display = isOpen ? "none" : "block";
  arrow.textContent  = isOpen ? "▶" : "▼";
});

function renderMemberAdmin() {
  const wrap = document.getElementById("member-list-admin");
  if (!wrap) return;
  wrap.innerHTML = members.map(m =>
    `<span style="background:#f0ede4;border:1px solid #ddd;border-radius:20px;padding:4px 10px;font-size:0.82rem;display:inline-flex;align-items:center;gap:6px">
      ${m}
      <button onclick="removeMember('${m}')" style="background:none;border:none;color:#aaa;cursor:pointer;font-size:0.8rem;padding:0">✕</button>
    </span>`
  ).join("");
}

document.getElementById("add-member-btn").addEventListener("click", () => {
  const input = document.getElementById("new-member-input");
  const name  = input.value.trim();
  if (!name) return;
  if (members.includes(name)) { alert("すでに登録されています"); return; }
  const newMembers = [...members, name];
  if (configRef) configRef.update({ members: newMembers });
  input.value = "";
  showToast(`${name}を追加しました`);
});

function removeMember(name) {
  if (!confirm(`${name}をメンバーから削除しますか？`)) return;
  if (configRef) configRef.update({ members: members.filter(m => m !== name) });
  showToast(`${name}を削除しました`);
}

// ---------- タブ ----------
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("panel-" + btn.dataset.tab).classList.add("active");
    if (btn.dataset.tab === "settings") { renderMemberAdmin(); }
  });
});

// ---------- トースト ----------
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg; el.style.display = "block";
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.style.display = "none", 2500);
}
</script>
</body>
